<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GARDMARINES</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at center, #0b1a2a, #050d16);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .logo-wrapper {
      position: relative;
      width: 300px;
      margin: 0 auto 20px;
    }

    .logo-wrapper img {
      width: 100%;
      z-index: 2;
      position: relative;
    }

    .rotating-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 260px;
      height: 260px;
      border: 2px dashed #d4af37;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: spin 20s linear infinite;
      opacity: 0.3;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    h1 {
      letter-spacing: 4px;
      margin: 10px 0;
    }

    .section {
      margin-top: 60px;
    }

    .players {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }

    .player {
      padding: 10px;
      border: 1px solid #d4af37;
      border-radius: 8px;
      transition: 0.3s;
    }

    .player:hover {
      background: #d4af37;
      color: black;
      transform: scale(1.05);
    }

    .tournaments {
      text-align: left;
    }

    .card {
      border-left: 3px solid #d4af37;
      padding: 10px 15px;
      margin: 10px 0;
      background: rgba(255,255,255,0.05);
      transition: 0.3s;
    }

    .card:hover {
      background: rgba(212,175,55,0.1);
      transform: translateX(5px);
    }

    footer {
      margin-top: 80px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo-wrapper">
      <div class="rotating-ring"></div>
      <img src="logo.png" alt="logo">
    </div>

    <h1>GARDMARINES</h1>
    <p>Сила. Дисциплина. Господство на море.</p>

    <div class="section">
      <h2>Состав флота</h2>
      <div class="players" id="players"></div>
    </div>

    <div class="section">
      <h2>Турниры и достижения</h2>
      <div class="tournaments">
        <div class="card">🏆 Турнир Северного моря — 1 место</div>
        <div class="card">⚓ Открытый морской кубок — финалисты</div>
        <div class="card">🔥 Битва кланов — топ 3</div>
      </div>
    </div>

    <footer>
      © GARDMARINES
    </footer>

  </div>

  <script>
    const playersContainer = document.getElementById('players');

    for (let i = 1; i <= 20; i++) {
      const div = document.createElement('div');
      div.className = 'player';
      div.textContent = 'игрок_' + i;
      div.style.opacity = 0;
      div.style.transform = 'translateY(20px)';

      setTimeout(() => {
        div.style.transition = '0.5s';
        div.style.opacity = 1;
        div.style.transform = 'translateY(0)';
      }, i * 100);

      playersContainer.appendChild(div);
    }
  </script>

</body>
</html>
